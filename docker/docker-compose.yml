# Run with: podman-compose up -d

services:
  mosquitto:
    image: docker.io/eclipse-mosquitto:2
    container_name: ghra-mosquitto
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  ros2-core:
    build:
      context: ./ros2-core
      dockerfile: Dockerfile
    container_name: ghra-ros2-core
    network_mode: host
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=1883

  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: ghra-web-dashboard
    network_mode: host
    restart: unless-stopped

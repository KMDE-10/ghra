# Run with: podman-compose up -d
# Or: podman compose up -d (if using podman-compose plugin)
#
# Before first run:
#   1. Generate SROS2 keys: see docker/ros2-core/security/generate_sros2_keys.sh
#   2. Generate TLS certs: see docker/web-dashboard/certs/generate_tls_certs.sh
#   3. Generate dashboard password: see docker/web-dashboard/generate_htpasswd.sh

services:
  micro-ros-agent:
    image: docker.io/microros/micro-ros-agent:humble
    container_name: ghra-micro-ros-agent
    command: udp4 --port 8888
    network_mode: host
    restart: unless-stopped
    environment:
      - ROS_SECURITY_KEYSTORE=/security/keystore
      - ROS_SECURITY_ENABLE=true
      - ROS_SECURITY_STRATEGY=Enforce
    volumes:
      - ./ros2-core/security/keystore:/security/keystore:ro

  ros2-core:
    build:
      context: ./ros2-core
      dockerfile: Dockerfile
    container_name: ghra-ros2-core
    network_mode: host
    restart: unless-stopped
    depends_on:
      - micro-ros-agent
    volumes:
      - ./ros2-core/security/keystore:/security/keystore:ro

  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: ghra-web-dashboard
    ports:
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./web-dashboard/certs:/etc/nginx/certs:ro
      - ./web-dashboard/.htpasswd:/etc/nginx/.htpasswd:ro

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold">ESP32 #1 — Motor Controller Wiring</text>
  <text x="550" y="62" text-anchor="middle" fill="#888" font-size="13">Device: /dev/ttyUSB0 | USB Port: 1-1.4 | MAC: 20:e7:c8:68:10:48 | ID: GPIO32 = HIGH (3.3V)</text>

  <!-- ============ ESP32 DEV BOARD ============ -->
  <rect x="370" y="90" width="260" height="630" fill="#2d2d44" stroke="#555" stroke-width="2" rx="10"/>
  <text x="500" y="115" text-anchor="middle" fill="#ccc" font-size="15" font-weight="bold">ESP32 38-Pin DevKit</text>

  <!-- USB connector -->
  <rect x="460" y="85" width="80" height="20" fill="#555" stroke="#777" stroke-width="1" rx="3"/>
  <text x="500" y="100" text-anchor="middle" fill="#aaa" font-size="10">USB</text>

  <!-- Left pins -->
  <g fill="#aaa" font-size="11">
    <text x="395" y="155" text-anchor="start">3V3</text>    <rect x="375" y="145" width="15" height="10" fill="#c0392b" rx="2"/>
    <text x="395" y="180" text-anchor="start">EN</text>     <rect x="375" y="170" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="205" text-anchor="start">GPIO36</text> <rect x="375" y="195" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="230" text-anchor="start">GPIO39</text> <rect x="375" y="220" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="255" text-anchor="start">GPIO34</text> <rect x="375" y="245" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="280" text-anchor="start">GPIO35</text> <rect x="375" y="270" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="305" text-anchor="start" fill="#f1c40f" font-weight="bold">GPIO32</text> <rect x="375" y="295" width="15" height="10" fill="#f1c40f" rx="2"/>
    <text x="395" y="330" text-anchor="start">GPIO33</text> <rect x="375" y="320" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="355" text-anchor="start" fill="#e67e22" font-weight="bold">GPIO25</text> <rect x="375" y="345" width="15" height="10" fill="#e67e22" rx="2"/>
    <text x="395" y="380" text-anchor="start" fill="#e67e22" font-weight="bold">GPIO26</text> <rect x="375" y="370" width="15" height="10" fill="#e67e22" rx="2"/>
    <text x="395" y="405" text-anchor="start">GPIO27</text> <rect x="375" y="395" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="430" text-anchor="start">GPIO14</text> <rect x="375" y="420" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="455" text-anchor="start">GPIO12</text> <rect x="375" y="445" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="480" text-anchor="start" fill="#c0392b" font-weight="bold">GND</text>    <rect x="375" y="470" width="15" height="10" fill="#333" rx="2"/>
    <text x="395" y="505" text-anchor="start">GPIO13</text> <rect x="375" y="495" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="530" text-anchor="start">GPIO9</text>  <rect x="375" y="520" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="555" text-anchor="start">GPIO10</text> <rect x="375" y="545" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="580" text-anchor="start">GPIO11</text> <rect x="375" y="570" width="15" height="10" fill="#666" rx="2"/>
    <text x="395" y="605" text-anchor="start" fill="#c0392b" font-weight="bold">VIN (5V)</text> <rect x="375" y="595" width="15" height="10" fill="#c0392b" rx="2"/>
  </g>

  <!-- Right pins -->
  <g fill="#aaa" font-size="11">
    <text x="605" y="155" text-anchor="end">GND</text>      <rect x="610" y="145" width="15" height="10" fill="#333" rx="2"/>
    <text x="605" y="180" text-anchor="end" fill="#2980b9" font-weight="bold">GPIO23</text>  <rect x="610" y="170" width="15" height="10" fill="#2980b9" rx="2"/>
    <text x="605" y="205" text-anchor="end" fill="#27ae60" font-weight="bold">GPIO22</text>  <rect x="610" y="195" width="15" height="10" fill="#27ae60" rx="2"/>
    <text x="605" y="230" text-anchor="end">GPIO1</text>    <rect x="610" y="220" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="255" text-anchor="end">GPIO3</text>    <rect x="610" y="245" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="280" text-anchor="end" fill="#27ae60" font-weight="bold">GPIO21</text>  <rect x="610" y="270" width="15" height="10" fill="#27ae60" rx="2"/>
    <text x="605" y="305" text-anchor="end">GND</text>      <rect x="610" y="295" width="15" height="10" fill="#333" rx="2"/>
    <text x="605" y="330" text-anchor="end" fill="#2980b9" font-weight="bold">GPIO19</text>  <rect x="610" y="320" width="15" height="10" fill="#2980b9" rx="2"/>
    <text x="605" y="355" text-anchor="end" fill="#2980b9" font-weight="bold">GPIO18</text>  <rect x="610" y="345" width="15" height="10" fill="#2980b9" rx="2"/>
    <text x="605" y="380" text-anchor="end" fill="#2980b9" font-weight="bold">GPIO5</text>   <rect x="610" y="370" width="15" height="10" fill="#2980b9" rx="2"/>
    <text x="605" y="405" text-anchor="end" fill="#9b59b6" font-weight="bold">GPIO17</text>  <rect x="610" y="395" width="15" height="10" fill="#9b59b6" rx="2"/>
    <text x="605" y="430" text-anchor="end" fill="#9b59b6" font-weight="bold">GPIO16</text>  <rect x="610" y="420" width="15" height="10" fill="#9b59b6" rx="2"/>
    <text x="605" y="455" text-anchor="end" fill="#2980b9" font-weight="bold">GPIO4</text>   <rect x="610" y="445" width="15" height="10" fill="#2980b9" rx="2"/>
    <text x="605" y="480" text-anchor="end">GPIO0</text>    <rect x="610" y="470" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="505" text-anchor="end">GPIO2</text>    <rect x="610" y="495" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="530" text-anchor="end">GPIO15</text>   <rect x="610" y="520" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="555" text-anchor="end">GPIO8</text>    <rect x="610" y="545" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="580" text-anchor="end">GPIO7</text>    <rect x="610" y="570" width="15" height="10" fill="#666" rx="2"/>
    <text x="605" y="605" text-anchor="end">GPIO6</text>    <rect x="610" y="595" width="15" height="10" fill="#666" rx="2"/>
  </g>

  <!-- ============ W5500 ETHERNET MODULE ============ -->
  <rect x="750" y="100" width="300" height="220" fill="#1a3a5c" stroke="#2980b9" stroke-width="2" rx="8"/>
  <text x="900" y="125" text-anchor="middle" fill="#5dade2" font-size="16" font-weight="bold">W5500 Ethernet Module</text>
  <text x="900" y="143" text-anchor="middle" fill="#7fb3d8" font-size="11">SPI Interface → RJ45 to network switch</text>

  <g fill="#bdc3c7" font-size="12">
    <text x="770" y="172">SCLK</text>  <rect x="830" y="162" width="50" height="14" fill="#2471a3" rx="3"/> <text x="843" y="173" fill="#fff" font-size="10">GPIO18</text>
    <text x="770" y="197">MISO</text>  <rect x="830" y="187" width="50" height="14" fill="#2471a3" rx="3"/> <text x="843" y="198" fill="#fff" font-size="10">GPIO19</text>
    <text x="770" y="222">MOSI</text>  <rect x="830" y="212" width="50" height="14" fill="#2471a3" rx="3"/> <text x="843" y="223" fill="#fff" font-size="10">GPIO23</text>
    <text x="770" y="247">CS</text>    <rect x="830" y="237" width="50" height="14" fill="#2471a3" rx="3"/> <text x="845" y="248" fill="#fff" font-size="10">GPIO5</text>
    <text x="770" y="272">RST</text>   <rect x="830" y="262" width="50" height="14" fill="#2471a3" rx="3"/> <text x="845" y="273" fill="#fff" font-size="10">GPIO4</text>
    <text x="770" y="297">3V3 / GND</text>
  </g>

  <!-- W5500 wires -->
  <line x1="625" y1="175" x2="750" y2="169" stroke="#2980b9" stroke-width="2"/>
  <line x1="625" y1="325" x2="750" y2="194" stroke="#2980b9" stroke-width="2"/>
  <line x1="625" y1="350" x2="750" y2="219" stroke="#2980b9" stroke-width="2"/>
  <line x1="625" y1="375" x2="750" y2="244" stroke="#2980b9" stroke-width="2"/>
  <line x1="625" y1="450" x2="750" y2="269" stroke="#2980b9" stroke-width="2"/>

  <!-- RJ45 icon -->
  <rect x="980" y="170" width="55" height="90" fill="#34495e" stroke="#7f8c8d" stroke-width="1" rx="4"/>
  <text x="1007" y="220" text-anchor="middle" fill="#bdc3c7" font-size="10">RJ45</text>

  <!-- ============ GP8211S DAC MODULE ============ -->
  <rect x="750" y="340" width="300" height="160" fill="#1a4a2e" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="900" y="365" text-anchor="middle" fill="#58d68d" font-size="16" font-weight="bold">GP8211S DAC (0-10V)</text>
  <text x="900" y="383" text-anchor="middle" fill="#82e0aa" font-size="11">I2C Addr: 0x58 → VFD AVI input</text>

  <g fill="#bdc3c7" font-size="12">
    <text x="770" y="412">SDA</text>   <rect x="830" y="402" width="50" height="14" fill="#1e8449" rx="3"/> <text x="843" y="413" fill="#fff" font-size="10">GPIO21</text>
    <text x="770" y="437">SCL</text>   <rect x="830" y="427" width="50" height="14" fill="#1e8449" rx="3"/> <text x="843" y="438" fill="#fff" font-size="10">GPIO22</text>
    <text x="770" y="462">VCC (3.3V)</text>
    <text x="770" y="482">GND</text>
  </g>

  <!-- DAC output -->
  <rect x="980" y="395" width="70" height="55" fill="#145a32" stroke="#27ae60" stroke-width="1" rx="4"/>
  <text x="1015" y="418" text-anchor="middle" fill="#82e0aa" font-size="10">0-10V</text>
  <text x="1015" y="433" text-anchor="middle" fill="#82e0aa" font-size="10">OUT</text>
  <text x="1015" y="448" text-anchor="middle" fill="#aaa" font-size="9">→ VFD</text>

  <!-- DAC wires -->
  <line x1="625" y1="275" x2="750" y2="409" stroke="#27ae60" stroke-width="2"/>
  <line x1="625" y1="200" x2="750" y2="434" stroke="#27ae60" stroke-width="2"/>

  <!-- ============ LASER DISTANCE SENSOR ============ -->
  <rect x="750" y="520" width="300" height="130" fill="#4a1a4a" stroke="#9b59b6" stroke-width="2" rx="8"/>
  <text x="900" y="545" text-anchor="middle" fill="#c39bd3" font-size="16" font-weight="bold">Laser Distance Sensor</text>
  <text x="900" y="563" text-anchor="middle" fill="#d2b4de" font-size="11">UART2 @ 19200 baud → carriage position</text>

  <g fill="#bdc3c7" font-size="12">
    <text x="770" y="593">TX → RX</text> <rect x="860" y="583" width="50" height="14" fill="#76448a" rx="3"/> <text x="873" y="594" fill="#fff" font-size="10">GPIO16</text>
    <text x="770" y="618">RX ← TX</text> <rect x="860" y="608" width="50" height="14" fill="#76448a" rx="3"/> <text x="873" y="619" fill="#fff" font-size="10">GPIO17</text>
    <text x="770" y="638">VCC (5V) / GND</text>
  </g>

  <!-- Laser wires -->
  <line x1="625" y1="400" x2="750" y2="590" stroke="#9b59b6" stroke-width="2"/>
  <line x1="625" y1="425" x2="750" y2="615" stroke="#9b59b6" stroke-width="2"/>

  <!-- ============ RELAY MODULE 1 (FWD) ============ -->
  <rect x="50" y="270" width="270" height="120" fill="#4a2a1a" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="185" y="295" text-anchor="middle" fill="#f0b27a" font-size="16" font-weight="bold">1-Ch Relay — FWD</text>
  <text x="185" y="313" text-anchor="middle" fill="#f5cba7" font-size="11">VFD Forward terminal</text>

  <g fill="#bdc3c7" font-size="12">
    <text x="70" y="343">IN</text>  <rect x="110" y="333" width="50" height="14" fill="#b45309" rx="3"/> <text x="123" y="344" fill="#fff" font-size="10">GPIO25</text>
    <text x="70" y="368">VCC (5V) / GND</text>
  </g>

  <!-- Relay 1 output -->
  <rect x="185" y="333" width="70" height="18" fill="#7e5109" stroke="#e67e22" stroke-width="1" rx="3"/>
  <text x="220" y="346" text-anchor="middle" fill="#f5cba7" font-size="10">→ VFD FWD</text>

  <!-- Relay 1 wire -->
  <line x1="375" y1="350" x2="160" y2="340" stroke="#e67e22" stroke-width="2"/>

  <!-- ============ RELAY MODULE 2 (REV) ============ -->
  <rect x="50" y="405" width="270" height="120" fill="#4a2a1a" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="185" y="430" text-anchor="middle" fill="#f0b27a" font-size="16" font-weight="bold">1-Ch Relay — REV</text>
  <text x="185" y="448" text-anchor="middle" fill="#f5cba7" font-size="11">VFD Reverse terminal</text>

  <g fill="#bdc3c7" font-size="12">
    <text x="70" y="478">IN</text>  <rect x="110" y="468" width="50" height="14" fill="#b45309" rx="3"/> <text x="123" y="479" fill="#fff" font-size="10">GPIO26</text>
    <text x="70" y="503">VCC (5V) / GND</text>
  </g>

  <!-- Relay 2 output -->
  <rect x="185" y="468" width="70" height="18" fill="#7e5109" stroke="#e67e22" stroke-width="1" rx="3"/>
  <text x="220" y="481" text-anchor="middle" fill="#f5cba7" font-size="10">→ VFD REV</text>

  <!-- Relay 2 wire -->
  <line x1="375" y1="375" x2="160" y2="475" stroke="#e67e22" stroke-width="2"/>

  <!-- ============ BOARD ID INDICATOR ============ -->
  <rect x="50" y="130" width="270" height="120" fill="#4a4a1a" stroke="#f1c40f" stroke-width="2" rx="8"/>
  <text x="185" y="155" text-anchor="middle" fill="#f9e79f" font-size="16" font-weight="bold">Board ID Pin</text>
  <text x="185" y="175" text-anchor="middle" fill="#f9e79f" font-size="12">GPIO32 = HIGH (3.3V)</text>
  <text x="185" y="198" text-anchor="middle" fill="#d4ac0d" font-size="12">Measure between GPIO32 and GND</text>
  <text x="185" y="218" text-anchor="middle" fill="#d4ac0d" font-size="12">to identify this as the MOTOR board</text>
  <text x="185" y="238" text-anchor="middle" fill="#f1c40f" font-size="14" font-weight="bold">3.3V = Motor | 0V = Remote</text>

  <!-- ID wire -->
  <line x1="375" y1="300" x2="320" y2="220" stroke="#f1c40f" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ============ POWER NOTES ============ -->
  <rect x="50" y="510" width="270" height="200" fill="#2d2d44" stroke="#e74c3c" stroke-width="2" rx="8"/>
  <text x="185" y="535" text-anchor="middle" fill="#e74c3c" font-size="16" font-weight="bold">Power Connections</text>
  <g fill="#bdc3c7" font-size="11">
    <text x="70" y="560" fill="#e74c3c">VIN (5V):</text>
    <text x="70" y="578">  Relay module VCC</text>
    <text x="70" y="596">  Laser sensor VCC</text>
    <text x="70" y="620" fill="#e74c3c">3V3:</text>
    <text x="70" y="638">  W5500 VCC</text>
    <text x="70" y="656">  GP8211S VCC</text>
    <text x="70" y="680" fill="#e74c3c">GND (shared):</text>
    <text x="70" y="698">  All modules share common GND</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <rect x="50" y="740" width="1000" height="60" fill="#222240" stroke="#555" stroke-width="1" rx="6"/>
  <text x="80" y="765" fill="#888" font-size="12" font-weight="bold">LEGEND:</text>
  <rect x="160" y="755" width="20" height="12" fill="#2980b9" rx="2"/> <text x="185" y="765" fill="#5dade2" font-size="11">SPI (W5500)</text>
  <rect x="290" y="755" width="20" height="12" fill="#27ae60" rx="2"/> <text x="315" y="765" fill="#58d68d" font-size="11">I2C (DAC)</text>
  <rect x="410" y="755" width="20" height="12" fill="#9b59b6" rx="2"/> <text x="435" y="765" fill="#c39bd3" font-size="11">UART2 (Laser)</text>
  <rect x="560" y="755" width="20" height="12" fill="#e67e22" rx="2"/> <text x="585" y="765" fill="#f0b27a" font-size="11">GPIO (Relays)</text>
  <rect x="700" y="755" width="20" height="12" fill="#f1c40f" rx="2"/> <text x="725" y="765" fill="#f9e79f" font-size="11">ID Pin</text>
  <rect x="810" y="755" width="20" height="12" fill="#333" rx="2"/>    <text x="835" y="765" fill="#999" font-size="11">Unused</text>
  <rect x="920" y="755" width="20" height="12" fill="#c0392b" rx="2"/> <text x="945" y="765" fill="#e74c3c" font-size="11">Power</text>
</svg>
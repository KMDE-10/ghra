<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="750" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold">ESP32 #2 — Remote Controller Wiring</text>
  <text x="450" y="62" text-anchor="middle" fill="#888" font-size="13">Device: /dev/ttyUSB1 | USB Port: 1-1.3 | MAC: 20:e7:c8:68:cc:88 | WiFi → micro-ROS Agent</text>

  <!-- ============ ESP32 DEV BOARD ============ -->
  <rect x="320" y="90" width="260" height="530" fill="#2d2d44" stroke="#555" stroke-width="2" rx="10"/>
  <text x="450" y="115" text-anchor="middle" fill="#ccc" font-size="15" font-weight="bold">ESP32 38-Pin DevKit</text>

  <!-- USB connector -->
  <rect x="410" y="85" width="80" height="20" fill="#555" stroke="#777" stroke-width="1" rx="3"/>
  <text x="450" y="100" text-anchor="middle" fill="#aaa" font-size="10">USB</text>

  <!-- Left pins -->
  <g fill="#aaa" font-size="11">
    <text x="345" y="150" text-anchor="start">3V3</text>    <rect x="325" y="140" width="15" height="10" fill="#c0392b" rx="2"/>
    <text x="345" y="175" text-anchor="start">EN</text>     <rect x="325" y="165" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="200" text-anchor="start">GPIO36</text> <rect x="325" y="190" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="225" text-anchor="start">GPIO39</text> <rect x="325" y="215" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="250" text-anchor="start">GPIO34</text> <rect x="325" y="240" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="275" text-anchor="start">GPIO35</text> <rect x="325" y="265" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="300" text-anchor="start">GPIO32</text> <rect x="325" y="290" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="325" text-anchor="start">GPIO33</text> <rect x="325" y="315" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="350" text-anchor="start">GPIO25</text> <rect x="325" y="340" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="375" text-anchor="start">GPIO26</text> <rect x="325" y="365" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="400" text-anchor="start" fill="#e74c3c" font-weight="bold">GPIO27</text> <rect x="325" y="390" width="15" height="10" fill="#e74c3c" rx="2"/>
    <text x="345" y="425" text-anchor="start" fill="#e67e22" font-weight="bold">GPIO14</text> <rect x="325" y="415" width="15" height="10" fill="#e67e22" rx="2"/>
    <text x="345" y="450" text-anchor="start" fill="#27ae60" font-weight="bold">GPIO12</text> <rect x="325" y="440" width="15" height="10" fill="#27ae60" rx="2"/>
    <text x="345" y="475" text-anchor="start" fill="#fff" font-weight="bold">GND</text>      <rect x="325" y="465" width="15" height="10" fill="#333" stroke="#fff" stroke-width="1" rx="2"/>
    <text x="345" y="500" text-anchor="start" fill="#2ecc71" font-weight="bold">GPIO13</text> <rect x="325" y="490" width="15" height="10" fill="#2ecc71" rx="2"/>
    <text x="345" y="525" text-anchor="start">GPIO9</text>  <rect x="325" y="515" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="550" text-anchor="start">GPIO10</text> <rect x="325" y="540" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="575" text-anchor="start">GPIO11</text> <rect x="325" y="565" width="15" height="10" fill="#666" rx="2"/>
    <text x="345" y="600" text-anchor="start">VIN</text>    <rect x="325" y="590" width="15" height="10" fill="#666" rx="2"/>
  </g>

  <!-- Right pins (all unused for remote) -->
  <g fill="#777" font-size="11">
    <text x="555" y="150" text-anchor="end">GND</text>    <rect x="560" y="140" width="15" height="10" fill="#333" rx="2"/>
    <text x="555" y="175" text-anchor="end">GPIO23</text> <rect x="560" y="165" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="200" text-anchor="end">GPIO22</text> <rect x="560" y="190" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="225" text-anchor="end">GPIO1</text>  <rect x="560" y="215" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="250" text-anchor="end">GPIO3</text>  <rect x="560" y="240" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="275" text-anchor="end">GPIO21</text> <rect x="560" y="265" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="300" text-anchor="end">GND</text>    <rect x="560" y="290" width="15" height="10" fill="#333" rx="2"/>
    <text x="555" y="325" text-anchor="end">GPIO19</text> <rect x="560" y="315" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="350" text-anchor="end">GPIO18</text> <rect x="560" y="340" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="375" text-anchor="end">GPIO5</text>  <rect x="560" y="365" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="400" text-anchor="end">GPIO17</text> <rect x="560" y="390" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="425" text-anchor="end">GPIO16</text> <rect x="560" y="415" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="450" text-anchor="end">GPIO4</text>  <rect x="560" y="440" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="475" text-anchor="end">GPIO0</text>  <rect x="560" y="465" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="500" text-anchor="end">GPIO2</text>  <rect x="560" y="490" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="525" text-anchor="end">GPIO15</text> <rect x="560" y="515" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="550" text-anchor="end">GPIO8</text>  <rect x="560" y="540" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="575" text-anchor="end">GPIO7</text>  <rect x="560" y="565" width="15" height="10" fill="#666" rx="2"/>
    <text x="555" y="600" text-anchor="end">GPIO6</text>  <rect x="560" y="590" width="15" height="10" fill="#666" rx="2"/>
  </g>

  <!-- ============ BUTTONS ============ -->

  <!-- Button 1: FWD FAST (Green) - GPIO12 -->
  <rect x="50" y="390" width="220" height="70" fill="#1a4a2e" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="160" y="415" text-anchor="middle" fill="#58d68d" font-size="14" font-weight="bold">Green Button 1</text>
  <text x="160" y="435" text-anchor="middle" fill="#82e0aa" font-size="12">FWD FAST — GPIO12 → GND</text>
  <text x="160" y="452" text-anchor="middle" fill="#aaa" font-size="10">Event: +1 (press) / -1 (release)</text>
  <!-- Wire -->
  <line x1="270" y1="430" x2="325" y2="445" stroke="#27ae60" stroke-width="2.5"/>

  <!-- Button 2: FWD SLOW (Green) - GPIO13 -->
  <rect x="50" y="470" width="220" height="70" fill="#1a4a2e" stroke="#2ecc71" stroke-width="2" rx="8"/>
  <text x="160" y="495" text-anchor="middle" fill="#58d68d" font-size="14" font-weight="bold">Green Button 2</text>
  <text x="160" y="515" text-anchor="middle" fill="#82e0aa" font-size="12">FWD SLOW — GPIO13 → GND</text>
  <text x="160" y="532" text-anchor="middle" fill="#aaa" font-size="10">Event: +2 (press) / -2 (release)</text>
  <!-- Wire -->
  <line x1="270" y1="505" x2="325" y2="495" stroke="#2ecc71" stroke-width="2.5"/>

  <!-- Button 3: BWD SLOW (Red) - GPIO14 -->
  <rect x="50" y="310" width="220" height="70" fill="#4a1a1a" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="160" y="335" text-anchor="middle" fill="#f0b27a" font-size="14" font-weight="bold">Red Button 1</text>
  <text x="160" y="355" text-anchor="middle" fill="#f5cba7" font-size="12">BWD SLOW — GPIO14 → GND</text>
  <text x="160" y="372" text-anchor="middle" fill="#aaa" font-size="10">Event: +3 (press) / -3 (release)</text>
  <!-- Wire -->
  <line x1="270" y1="345" x2="325" y2="420" stroke="#e67e22" stroke-width="2.5"/>

  <!-- Button 4: BWD FAST (Red) - GPIO27 -->
  <rect x="50" y="230" width="220" height="70" fill="#4a1a1a" stroke="#e74c3c" stroke-width="2" rx="8"/>
  <text x="160" y="255" text-anchor="middle" fill="#ec7063" font-size="14" font-weight="bold">Red Button 2</text>
  <text x="160" y="275" text-anchor="middle" fill="#f1948a" font-size="12">BWD FAST — GPIO27 → GND</text>
  <text x="160" y="292" text-anchor="middle" fill="#aaa" font-size="10">Event: +4 (press) / -4 (release)</text>
  <!-- Wire -->
  <line x1="270" y1="268" x2="325" y2="395" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- GND common wire from buttons -->
  <line x1="160" y1="460" x2="160" y2="468" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="160" y1="380" x2="160" y2="388" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="160" y1="300" x2="160" y2="308" stroke="#fff" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- GND bus line -->
  <line x1="30" y1="560" x2="325" y2="470" stroke="#fff" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="120" y="558" fill="#fff" font-size="10" font-weight="bold">COMMON GND</text>

  <!-- ============ WIRING SCHEMATIC ============ -->
  <rect x="50" y="95" width="220" height="120" fill="#2d2d44" stroke="#3498db" stroke-width="2" rx="8"/>
  <text x="160" y="120" text-anchor="middle" fill="#5dade2" font-size="15" font-weight="bold">Wiring Per Button</text>

  <!-- Button schematic -->
  <g transform="translate(75, 135)">
    <!-- GPIO pin -->
    <rect x="0" y="5" width="40" height="16" fill="#444" stroke="#888" stroke-width="1" rx="3"/>
    <text x="20" y="17" text-anchor="middle" fill="#fff" font-size="9">GPIO</text>

    <!-- Wire to button -->
    <line x1="40" y1="13" x2="65" y2="13" stroke="#aaa" stroke-width="2"/>

    <!-- Button symbol -->
    <circle cx="70" cy="13" r="4" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
    <circle cx="100" cy="13" r="4" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
    <line x1="68" y1="6" x2="97" y2="3" stroke="#f1c40f" stroke-width="2"/>
    <text x="85" y="0" text-anchor="middle" fill="#f1c40f" font-size="8">PUSH</text>

    <!-- Wire to GND -->
    <line x1="104" y1="13" x2="130" y2="13" stroke="#aaa" stroke-width="2"/>

    <!-- GND symbol -->
    <line x1="130" y1="5" x2="130" y2="21" stroke="#fff" stroke-width="2"/>
    <line x1="124" y1="8" x2="136" y2="8" stroke="#fff" stroke-width="1.5"/>
    <line x1="126" y1="13" x2="134" y2="13" stroke="#fff" stroke-width="1.5"/>
    <line x1="128" y1="18" x2="132" y2="18" stroke="#fff" stroke-width="1.5"/>
    <text x="130" y="35" text-anchor="middle" fill="#888" font-size="9">GND</text>
  </g>

  <text x="160" y="195" text-anchor="middle" fill="#aaa" font-size="10">Internal pull-up enabled</text>
  <text x="160" y="208" text-anchor="middle" fill="#aaa" font-size="10">No external resistors needed</text>

  <!-- ============ WIFI INFO ============ -->
  <rect x="630" y="95" width="240" height="170" fill="#1a3a5c" stroke="#3498db" stroke-width="2" rx="8"/>
  <text x="750" y="120" text-anchor="middle" fill="#5dade2" font-size="16" font-weight="bold">WiFi Connection</text>

  <!-- WiFi icon (simple) -->
  <g transform="translate(720, 140)">
    <path d="M-20,15 Q0,-15 20,15" fill="none" stroke="#5dade2" stroke-width="2"/>
    <path d="M-13,12 Q0,-5 13,12" fill="none" stroke="#5dade2" stroke-width="2"/>
    <path d="M-6,10 Q0,2 6,10" fill="none" stroke="#5dade2" stroke-width="2"/>
    <circle cx="0" cy="13" r="3" fill="#5dade2"/>
  </g>

  <g fill="#bdc3c7" font-size="12">
    <text x="650" y="180">SSID:</text>    <text x="710" y="180" fill="#f39c12">YOUR_WIFI_SSID</text>
    <text x="650" y="200">Pass:</text>    <text x="710" y="200" fill="#f39c12">YOUR_WIFI_PASSWORD</text>
    <text x="650" y="225">Agent IP:</text> <text x="730" y="225" fill="#5dade2">192.168.1.100</text>
    <text x="650" y="245">Agent Port:</text> <text x="740" y="245" fill="#5dade2">8888 (UDP)</text>
  </g>

  <!-- ============ ROS2 TOPIC INFO ============ -->
  <rect x="630" y="290" width="240" height="100" fill="#2d2d44" stroke="#9b59b6" stroke-width="2" rx="8"/>
  <text x="750" y="315" text-anchor="middle" fill="#c39bd3" font-size="14" font-weight="bold">ROS2 Topic</text>
  <text x="750" y="340" text-anchor="middle" fill="#d2b4de" font-size="12">Publishes:</text>
  <text x="750" y="360" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">/remote/button_event</text>
  <text x="750" y="380" text-anchor="middle" fill="#aaa" font-size="10">std_msgs/Int8</text>

  <!-- ============ BUTTON EVENT TABLE ============ -->
  <rect x="630" y="410" width="240" height="190" fill="#2d2d44" stroke="#555" stroke-width="2" rx="8"/>
  <text x="750" y="435" text-anchor="middle" fill="#ccc" font-size="14" font-weight="bold">Button Events</text>

  <!-- Table header -->
  <line x1="645" y1="442" x2="855" y2="442" stroke="#555" stroke-width="1"/>
  <text x="685" y="458" text-anchor="middle" fill="#888" font-size="10">Button</text>
  <text x="770" y="458" text-anchor="middle" fill="#888" font-size="10">Press</text>
  <text x="835" y="458" text-anchor="middle" fill="#888" font-size="10">Release</text>
  <line x1="645" y1="463" x2="855" y2="463" stroke="#555" stroke-width="1"/>

  <!-- Table rows -->
  <text x="685" y="483" text-anchor="middle" fill="#27ae60" font-size="11">Green 1</text>
  <text x="770" y="483" text-anchor="middle" fill="#fff" font-size="11">+1</text>
  <text x="835" y="483" text-anchor="middle" fill="#aaa" font-size="11">-1</text>

  <text x="685" y="508" text-anchor="middle" fill="#2ecc71" font-size="11">Green 2</text>
  <text x="770" y="508" text-anchor="middle" fill="#fff" font-size="11">+2</text>
  <text x="835" y="508" text-anchor="middle" fill="#aaa" font-size="11">-2</text>

  <text x="685" y="533" text-anchor="middle" fill="#e67e22" font-size="11">Red 1</text>
  <text x="770" y="533" text-anchor="middle" fill="#fff" font-size="11">+3</text>
  <text x="835" y="533" text-anchor="middle" fill="#aaa" font-size="11">-3</text>

  <text x="685" y="558" text-anchor="middle" fill="#e74c3c" font-size="11">Red 2</text>
  <text x="770" y="558" text-anchor="middle" fill="#fff" font-size="11">+4</text>
  <text x="835" y="558" text-anchor="middle" fill="#aaa" font-size="11">-4</text>

  <text x="750" y="590" text-anchor="middle" fill="#888" font-size="10">Debounce: 20ms | Poll: ~200Hz</text>

  <!-- ============ LEGEND ============ -->
  <rect x="50" y="640" width="820" height="90" fill="#222240" stroke="#555" stroke-width="1" rx="6"/>
  <text x="80" y="665" fill="#888" font-size="12" font-weight="bold">WIRING SUMMARY:</text>
  <text x="80" y="688" fill="#aaa" font-size="12">Only 4 GPIOs + 1 GND used. Each button wires between its GPIO pin and GND.</text>
  <text x="80" y="708" fill="#aaa" font-size="12">Internal pull-ups are enabled in firmware — no external resistors or capacitors needed.</text>
  <text x="80" y="722" fill="#f39c12" font-size="11">NOTE: Update WIFI_SSID and WIFI_PASSWORD in esp32-remote.ino before use!</text>
</svg>